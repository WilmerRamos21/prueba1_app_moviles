<ion-header>

  <ion-toolbar color="primary">

    <ion-title>
      Perfil
    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content
  class="ion-padding"
>

  <ion-card *ngIf="user">

    <ion-card-content
      class="ion-text-center"
    >

      <!-- AVATAR -->

    <ion-avatar class="avatar">

      <img

        [src]="avatarUrl || 'https://ionicframework.com/docs/img/demos/avatar.svg'"

      />

    </ion-avatar>

    <!-- INPUT -->

    <input
  type="file"
  hidden
  #fileInput
  accept="image/*"
  (change)="uploadAvatar($event)"
/>

<ion-button
  expand="block"
  (click)="fileInput.click()"
>

  Cambiar Foto

</ion-button>
      <!-- EMAIL -->

      <h2>

        {{ user.email }}

      </h2>


      <!-- ID -->

      <p>

        <strong>ID:</strong>

        {{ user.id }}

      </p>


      <!-- FECHA -->

      <p>

        <strong>Cuenta creada:</strong>

        {{ user.created_at | date }}

      </p>

      <ion-item>

  <ion-textarea

    label="Descripción"

    labelPlacement="stacked"

    placeholder="Escribe algo sobre ti..."

    [(ngModel)]="description"

  >
  </ion-textarea>

</ion-item>
<ion-button
  expand="block"
  (click)="saveProfile()"
>

  Guardar Perfil

</ion-button>

    </ion-card-content>

  </ion-card>




</ion-content>

<div class="nav-container">
      <ion-button
      class="nav-button"
      routerLink="/home"
    >

      <ion-icon
        slot="start"
        name="home"
      ></ion-icon>

      Home

    </ion-button>

          <ion-button
      class="nav-button"
      routerLink="/character-list"
    >

      <ion-icon
        slot="start"
        name="search"
      ></ion-icon>

      API Anime

    </ion-button>

<ion-button
      class="nav-button"
      routerLink="/profile"
    >

      <ion-icon
        slot="start"
        name="person"
      ></ion-icon>

      Perfil

    </ion-button>

        <ion-button
  color="danger"
  (click)="logout()"
>

  <ion-icon
    slot="start"
    name="log-out-outline"
  ></ion-icon>

  Cerrar Sesión

</ion-button>
</div>
